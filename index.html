<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuli Kuli — Packaging Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Brand tokens ────────────────────────────────── */
    :root {
      --forest:   #026251;
      --kkgreen:  #52B480;
      --neon:     #D0DE41;
      --orange:   #F15F23;
      --cream:    #F4F5EA;
      --white:    #FFFFFF;
      --ink:      #1D1D1D;
      --sidebar-w: 300px;
      --radius:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────── */
    .topbar {
      background: var(--forest);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      flex-shrink: 0;
      border-bottom: 3px solid var(--neon);
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo svg {
      height: 28px;
      width: auto;
    }

    .topbar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.075em;
      text-transform: uppercase;
      color: var(--neon);
    }

    .topbar-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.075em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── Layout ──────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--forest);
      color: var(--white);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .search-wrap {
      padding: 16px 16px 8px;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 150ms;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-input:focus { border-color: var(--neon); }

    .category-group { margin-bottom: 4px; }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      cursor: pointer;
      user-select: none;
    }

    .category-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neon);
    }

    .category-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }

    .category-chevron {
      color: rgba(255,255,255,0.35);
      font-size: 10px;
      transition: transform 150ms;
    }
    .category-group.collapsed .category-chevron { transform: rotate(-90deg); }
    .category-group.collapsed .item-list { display: none; }

    .item-list { list-style: none; padding-bottom: 4px; }

    .item-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 16px 9px 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 100ms;
      border-left: 3px solid transparent;
    }
    .item-btn:hover { background: rgba(255,255,255,0.06); }
    .item-btn.active {
      background: rgba(208,222,65,0.12);
      border-left-color: var(--neon);
    }

    .item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #52B480; }
    .dot-orange { background: #F15F23; }
    .dot-red    { background: #E05252; }

    .item-name {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
      flex: 1;
    }
    .item-btn.active .item-name { color: var(--white); }

    .item-sku {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }

    /* ── Main panel ───────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: rgba(2,98,81,0.35);
    }
    .empty-state svg { opacity: 0.25; margin-bottom: 16px; }
    .empty-state p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Detail card ──────────────────────────────────── */
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .detail-category-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--neon);
      color: var(--forest);
      border-radius: 4px;
      padding: 3px 8px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .detail-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--forest);
      line-height: 1.1;
    }

    .detail-sku {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--kkgreen);
      margin-top: 4px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-stocked   { background: rgba(82,180,128,0.15); color: #52B480; border: 1px solid rgba(82,180,128,0.3); }
    .badge-low       { background: rgba(241,95,35,0.12); color: var(--orange); border: 1px solid rgba(241,95,35,0.25); }
    .badge-stockout  { background: rgba(224,82,82,0.12); color: #E05252; border: 1px solid rgba(224,82,82,0.25); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(2,98,81,0.5);
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--forest);
      line-height: 1;
    }
    .stat-value.zero { color: #E05252; }

    .stat-sub {
      font-size: 12px;
      color: rgba(29,29,29,0.45);
    }

    .info-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
    }

    .info-card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(2,98,81,0.5);
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--cream);
    }
    .info-row:last-child { border-bottom: none; }

    .info-row-label {
      font-size: 14px;
      color: rgba(29,29,29,0.6);
    }

    .info-row-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--ink);
      font-weight: 500;
    }

    .po-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(241,95,35,0.1);
      color: var(--orange);
      border: 1px solid rgba(241,95,35,0.25);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .po-none {
      color: rgba(29,29,29,0.3);
      font-size: 13px;
    }

    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── Product image ───────────────────────────────── */
    .product-img-wrap {
      flex-shrink: 0;
      width: 110px;
      height: 110px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .product-img-placeholder {
      width: 110px;
      height: 110px;
      border-radius: 16px;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Tabs ────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid rgba(2,98,81,0.1);
      padding-bottom: 0;
    }

    .tab-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: rgba(2,98,81,0.4);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 120ms, border-color 120ms;
    }
    .tab-btn:hover { color: var(--forest); }
    .tab-btn.active {
      color: var(--forest);
      border-bottom-color: var(--neon);
      font-weight: 600;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: contents; }

    .ingredients-empty {
      background: var(--white);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      color: rgba(2,98,81,0.3);
    }
    .ingredients-empty p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* ── Ingredient Calculator ───────────────────────── */
    .calc-input-card {
      background: var(--forest);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .calc-input-left { display: flex; flex-direction: column; gap: 4px; }
    .calc-input-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neon);
    }
    .calc-input-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }
    .units-input {
      background: rgba(255,255,255,0.1);
      border: 2px solid var(--neon);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      width: 160px;
      text-align: right;
      outline: none;
    }
    .units-input:focus { background: rgba(255,255,255,0.15); }

    .calc-summary {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .calc-summary-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(2,98,81,0.5);
    }
    .calc-max-units {
      font-size: 22px;
      font-weight: 700;
      color: var(--forest);
    }
    .calc-max-units.ok    { color: #52B480; }
    .calc-max-units.warn  { color: var(--orange); }
    .calc-max-units.short { color: #E05252; }
    .bottleneck-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--orange);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.03em;
    }

    .calc-verdict {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .verdict-ok    { background: rgba(82,180,128,0.12); color: #52B480; border: 1px solid rgba(82,180,128,0.3); }
    .verdict-short { background: rgba(224,82,82,0.1);   color: #E05252; border: 1px solid rgba(224,82,82,0.25); }

    .ing-table {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ing-table-header {
      display: grid;
      grid-template-columns: 1fr 70px 100px 100px 36px;
      padding: 10px 20px;
      border-bottom: 2px solid var(--cream);
    }
    .ing-th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(2,98,81,0.45);
    }
    .ing-th:not(:first-child) { text-align: right; }

    .ing-row {
      display: grid;
      grid-template-columns: 1fr 70px 100px 100px 36px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--cream);
      align-items: center;
      transition: background 100ms;
    }
    .ing-row:last-child { border-bottom: none; }
    .ing-row:hover { background: rgba(2,98,81,0.02); }

    .ing-name-wrap { display: flex; flex-direction: column; gap: 2px; }
    .ing-name { font-size: 14px; color: var(--ink); font-weight: 500; }
    .ing-sku-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(2,98,81,0.45); letter-spacing: 0.04em; }
    .ing-pct  { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(29,29,29,0.5); text-align: right; }
    .ing-kg   { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--forest); font-weight: 600; text-align: right; }
    .ing-avail { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(29,29,29,0.6); text-align: right; }

    .ing-status {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-left: auto;
    }
    .ing-status.ok    { background: #52B480; }
    .ing-status.short { background: #E05252; }

    .ing-row.short-row .ing-name { color: #E05252; }
    .ing-row.short-row { background: rgba(224,82,82,0.03); }

    /* ── Animations ──────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 180ms ease-out both; }

    /* ── Login overlay ───────────────────────────────── */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--forest);
      display: flex; align-items: center; justify-content: center;
    }
    #loginOverlay.hidden { display: none; }
    .login-card {
      background: var(--cream);
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .login-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--forest); opacity: 0.6;
    }
    .login-title {
      font-size: 22px; font-weight: 700; color: var(--forest);
      text-align: center; line-height: 1.3;
    }
    .login-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .login-input {
      width: 100%; box-sizing: border-box;
      padding: 12px 16px; border-radius: 8px;
      border: 1.5px solid rgba(2,98,81,0.2);
      background: #fff; font-size: 15px; color: var(--ink);
      outline: none; transition: border-color 0.15s;
    }
    .login-input:focus { border-color: var(--forest); }
    .login-btn {
      width: 100%; padding: 13px;
      background: var(--forest); color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #014d3e; }
    .login-error {
      font-size: 13px; color: #c0392b; text-align: center;
      min-height: 18px;
    }
    #appRoot { display: contents; }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">Kuli Kuli Foods</div>
    <div class="login-title">Production Planning<br>Dashboard</div>
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <input class="login-input" id="loginPassword" type="password"
             placeholder="Enter password" autocomplete="current-password" autofocus />
      <button class="login-btn" type="submit">Enter</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP ROOT -->
<div id="appRoot" style="display:none">

// ── CSV PARSER ────────────────────────────────────────────────────
function parseCSV(text) {
  return text.split('\n').map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseSheetData(rows) {
  // Grab "Last Updated" value from the sheet header area
  for (const row of rows) {
    if (row[0]?.toLowerCase().includes('last updated')) {
      const d = row[1]?.trim();
      if (d) document.getElementById('last-updated').textContent = `Live · Last updated ${d}`;
      break;
    }
  }

  // Find the header row (first col === "SKU")
  let hi = rows.findIndex(r => r[0]?.trim().toUpperCase() === 'SKU');
  if (hi === -1) return [];

  return rows.slice(hi + 1).reduce((acc, row) => {
    const sku  = row[0]?.trim();
    const item = row[1]?.trim();
    if (!sku || !item) return acc;

    const sep      = item.indexOf(' : ');
    const category = sep > -1 ? item.slice(0, sep).trim() : 'OTHER';
    const name     = sep > -1 ? item.slice(sep + 3).trim() : item;
    const inventory   = parseInt((row[2] || '0').replace(/\D/g, '')) || 0;
    const nextProdDate = row[3]?.trim() || '';
    const nextProdQty  = parseInt((row[4] || '0').replace(/\D/g, '')) || 0;
    const leadTime     = row[5]?.trim() || '';
    const poRaw        = row[6]?.trim();
    const po           = (!poRaw || poRaw === '-') ? null : poRaw;

    acc.push({ sku, category, name, inventory, nextProdDate, nextProdQty, leadTime, po });
    return acc;
  }, []);
}

function kgNeeded(units, weightPerUnit, pct) {
  return units * (weightPerUnit / 1000) * pct;
}

function maxUnitsFromStock(bom, pkgInventory) {
  const fromIngredients = Math.floor(Math.min(...bom.ingredients.map(ing =>
    ing.available / ((bom.weightPerUnit / 1000) * ing.pct)
  )));
  const fromPackaging = (pkgInventory != null && isFinite(pkgInventory)) ? pkgInventory : Infinity;
  return {
    total: Math.min(fromIngredients, fromPackaging),
    fromIngredients,
    fromPackaging,
    bottleneck: fromPackaging < fromIngredients ? 'packaging' : 'ingredients'
  };
}

// Live sheet SKUs come as "Packaging : PKGxxx"; BOM keys are just "PKGxxx"
function getBomKey(sku) {
  return sku.replace(/^Packaging\s*:\s*/i, '').trim();
}

function updateCalc() {
  const item = SKUs.find(s => s.sku === activeSkuId);
  if (!item) return;
  const bom = BOM[getBomKey(item.sku)];
  if (!bom) return;

  const units = parseInt(document.getElementById('unitsInput')?.value) || 0;
  const maxResult = maxUnitsFromStock(bom, item.inventory);
  const maxU = maxResult.total;
  const canMake = maxU >= units;

  // Summary
  const summaryEl = document.getElementById('calcSummary');
  if (summaryEl) {
    const cls = canMake ? 'ok' : 'short';
    const verdictCls = canMake ? 'verdict-ok' : 'verdict-short';
    const verdictLabel = canMake ? '✓ Enough Stock' : '✗ Insufficient Stock';
    const bottleneckNote = (!canMake && maxResult.bottleneck === 'packaging')
      ? `<div class="bottleneck-note">⚠ Not enough pouches — only ${fmt(maxResult.fromPackaging)} units of packaging on hand</div>`
      : '';
    summaryEl.innerHTML = `
      <div>
        <div class="calc-summary-label">Max units from current stock</div>
        <div class="calc-max-units ${cls}">${fmt(maxU)} units</div>
        ${bottleneckNote}
      </div>
      <span class="calc-verdict ${verdictCls}">${verdictLabel}</span>`;
  }

  // Ingredient rows
  const rowsEl = document.getElementById('ingRows');
  if (rowsEl) {
    rowsEl.innerHTML = bom.ingredients.map(ing => {
      const needed   = kgNeeded(units, bom.weightPerUnit, ing.pct);
      const hasEnough = ing.available >= needed;
      const shortClass = hasEnough ? '' : 'short-row';
      const dotClass   = hasEnough ? 'ok' : 'short';
      return `
        <div class="ing-row ${shortClass}">
          <span class="ing-name-wrap">
            <span class="ing-name">${ing.name}</span>
            <span class="ing-sku-tag">${ing.sku}</span>
          </span>
          <span class="ing-pct">${(ing.pct * 100).toFixed(1)}%</span>
          <span class="ing-kg">${needed < 0.01 && needed > 0 ? '<0.01' : needed.toFixed(2)} kg</span>
          <span class="ing-avail">${ing.available} kg</span>
          <span class="ing-status ${dotClass}"></span>
        </div>`;
    }).join('');
  }
}

// ── LIVE FETCH ────────────────────────────────────────────────────
// Parse ING INV CSV into a map of { 'Ingredients : INGXXX': availableKg }
function parseIngredientInventory(rows) {
  const map = {};
  let skuCol = -1, invCol = -1;
  for (const row of rows) {
    // Find the header row
    if (skuCol === -1) {
      const idx = row.findIndex(c => c.trim().toUpperCase() === 'SKU');
      if (idx !== -1) {
        skuCol = idx;
        // Look for "Current Inventory" or "Available" column
        invCol = row.findIndex(c => /current.?inv|available/i.test(c.trim()));
        if (invCol === -1) invCol = skuCol + 2; // fallback: 3rd column
      }
      continue;
    }
    const sku = (row[skuCol] || '').trim();
    if (!sku || !sku.startsWith('Ingredients')) continue;
    const raw = (row[invCol] || '').replace(/,/g, '').trim();
    const qty = parseFloat(raw);
    if (!isNaN(qty)) map[sku] = qty;
  }
  return map;
}

// Apply live ingredient inventory to BOM
function applyIngredientInventory(ingMap) {
  if (!Object.keys(ingMap).length) return;
  Object.values(BOM).forEach(bomEntry => {
    bomEntry.ingredients.forEach(ing => {
      if (ingMap.hasOwnProperty(ing.sku)) {
        ing.available = ingMap[ing.sku];
      }
    });
  });
}

async function fetchData() {
  document.getElementById('sidebarNav').innerHTML =
    `<div style="padding:20px 16px;color:rgba(255,255,255,0.35);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;">Loading live data…</div>`;

  // Fetch both sheets in parallel
  const [pkgResult, ingResult] = await Promise.allSettled([
    fetch(CSV_URL),
    fetch(ING_CSV_URL)
  ]);

  // PKG INV — packaging inventory (sidebar data)
  try {
    if (pkgResult.status !== 'fulfilled' || !pkgResult.value.ok)
      throw new Error('PKG fetch failed');
    const rows = parseCSV(await pkgResult.value.text());
    const parsed = parseSheetData(rows);
    if (!parsed.length) throw new Error('Empty PKG data');
    SKUs = parsed;
  } catch (err) {
    console.warn('PKG live fetch failed — using cached data.', err.message);
    SKUs = FALLBACK_SKUs;
    document.getElementById('last-updated').textContent = 'Cached · 07-13-2026';
  }

  // ING INV — ingredient inventory (BOM available values)
  try {
    if (ingResult.status !== 'fulfilled' || !ingResult.value.ok)
      throw new Error('ING fetch failed');
    const ingRows = parseCSV(await ingResult.value.text());
    const ingMap = parseIngredientInventory(ingRows);
    applyIngredientInventory(ingMap);
    console.log(`Live ingredient inventory loaded: ${Object.keys(ingMap).length} ingredients`);
  } catch (err) {
    console.warn('ING live fetch failed — using hardcoded BOM values.', err.message);
  }

  renderSidebar();
}

const CATEGORY_LABELS = {
  DRNKMX: "Drink Mix",
  GUM:    "Gummies",
  LATTE:  "Lattes",
  PM:     "Powder Mix",
  SFBLND: "Superfood Blends",
};

// Categories derived from live data at render time (not at parse time)
function getCategories() { return [...new Set(SKUs.map(s => s.category))]; }

function getStatus(item) {
  if (item.inventory === 0) return "stockout";
  if (item.inventory < 3000) return "low";
  return "stocked";
}

function dotClass(item) {
  const s = getStatus(item);
  return s === "stocked" ? "dot-green" : s === "low" ? "dot-orange" : "dot-red";
}

function fmt(n) {
  return n.toLocaleString("en-US");
}

// ── SIDEBAR RENDER ────────────────────────────────────────────────
function renderSidebar(filter = "") {
  const nav = document.getElementById("sidebarNav");
  nav.innerHTML = "";

  getCategories().forEach(cat => {
    const items = SKUs.filter(s =>
      s.category === cat &&
      (filter === "" || s.name.toLowerCase().includes(filter) || s.sku.toLowerCase().includes(filter))
    );
    if (items.length === 0) return;

    const group = document.createElement("div");
    group.className = "category-group";
    group.dataset.cat = cat;

    group.innerHTML = `
      <div class="category-header">
        <span class="category-label">${CATEGORY_LABELS[cat] || cat}</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="category-count">${items.length}</span>
          <span class="category-chevron">▾</span>
        </div>
      </div>
      <ul class="item-list">
        ${items.map(item => `
          <li>
            <button class="item-btn" data-sku="${item.sku}" onclick="selectItem('${item.sku}')">
              <span class="item-dot ${dotClass(item)}"></span>
              <span class="item-name">${item.name}</span>
            </button>
          </li>
        `).join("")}
      </ul>
    `;

    group.querySelector(".category-header").addEventListener("click", () => {
      group.classList.toggle("collapsed");
    });

    nav.appendChild(group);
  });
}
